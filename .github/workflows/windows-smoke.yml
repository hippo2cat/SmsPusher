name: Windows Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/tauri/**"
      - "services/desktop-rust/**"
      - ".github/workflows/windows-smoke.yml"
      - "version.properties"
  push:
    branches:
      - master
    paths:
      - "apps/tauri/**"
      - "services/desktop-rust/**"
      - ".github/workflows/windows-smoke.yml"
      - "version.properties"

jobs:
  build:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/tauri
        run: npm ci

      - name: Build frontend
        working-directory: apps/tauri
        run: npm run build

      - name: Build desktop binary
        run: cargo build --manifest-path apps/tauri/src-tauri/Cargo.toml --bin SmsPusher
