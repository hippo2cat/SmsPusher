name: Android Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;30.0.14904198"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Restore release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p apps/android/release
          echo "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > apps/android/release/SmsPusher-release.jks

      - name: Read version
        id: android_version
        shell: bash
        run: |
          set -euo pipefail
          source version.properties
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build signed release APK
        working-directory: apps/android
        env:
          SMSPUSHER_RELEASE_STORE_FILE: release/SmsPusher-release.jks
          SMSPUSHER_RELEASE_STORE_PASSWORD: ${{ secrets.SMSPUSHER_RELEASE_STORE_PASSWORD }}
          SMSPUSHER_RELEASE_KEY_ALIAS: ${{ secrets.SMSPUSHER_RELEASE_KEY_ALIAS }}
          SMSPUSHER_RELEASE_KEY_PASSWORD: ${{ secrets.SMSPUSHER_RELEASE_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease

      - name: Rename release APK
        env:
          VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
        run: |
          set -euo pipefail
          cp apps/android/build/outputs/apk/release/SmsPusher-release.apk "apps/android/build/outputs/apk/release/SmsPusher-${VERSION_NAME}.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsPusher-${{ steps.android_version.outputs.version_name }}
          path: apps/android/build/outputs/apk/release/SmsPusher-${{ steps.android_version.outputs.version_name }}.apk

      - name: Upload APK to existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
        run: |
          set -euo pipefail
          gh release upload "v${VERSION_NAME}" "apps/android/build/outputs/apk/release/SmsPusher-${VERSION_NAME}.apk" --clobber
